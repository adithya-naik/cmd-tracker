# ci.yml
# This workflow runs on every Pull Request
# It validates code quality before merging
# Think of it as a gatekeeper — bad code doesn't get in!

name: CI

# WHEN to run this workflow
on:
  pull_request:
    # Run when PR targets these branches
    branches:
      - develop
      - main

jobs:
  # JOB 1 — Validate the code
  validate:
    name: Validate Code
    
    # Run on latest Ubuntu Linux
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Checkout the code
      # Without this — the runner has no code to work with!
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Setup Node.js
      # We specify version 20 — same as what we use locally
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # Step 3 — Install dependencies
      # Same as running npm install locally
      - name: Install dependencies
        run: npm ci

      # Step 4 — Check package.json is valid
      # Validates our package structure is correct
      - name: Validate package.json
        run: node -e "require('./package.json')"

      # Step 5 — Check all files exist
      # Makes sure no one accidentally deleted a file
      - name: Validate project structure
        run: |
          echo "Checking required files exist..."
          test -f bin/tracker.js && echo "✅ bin/tracker.js exists"
          test -f src/utils/storage.js && echo "✅ storage.js exists"
          test -f src/utils/categorizer.js && echo "✅ categorizer.js exists"
          test -f src/utils/validator.js && echo "✅ validator.js exists"
          test -f src/utils/hook.js && echo "✅ hook.js exists"
          test -f src/commands/init.js && echo "✅ init.js exists"
          test -f src/commands/save.js && echo "✅ save.js exists"
          test -f src/commands/list.js && echo "✅ list.js exists"
          test -f src/commands/search.js && echo "✅ search.js exists"
          test -f src/commands/stats.js && echo "✅ stats.js exists"
          test -f src/commands/clear.js && echo "✅ clear.js exists"
          test -f src/commands/export.js && echo "✅ export.js exists"
          test -f src/commands/favorite.js && echo "✅ favorite.js exists"
          test -f src/commands/hook.js && echo "✅ hook command exists"
          echo "✅ All required files present!"

      # Step 6 — Test core logic works
      # Actually runs our categorizer and storage to verify they work
      - name: Test core functionality
        run: |
          echo "Testing categorizer..."
          node -e "
            const {categorize} = require('./src/utils/categorizer');
            console.assert(categorize('git status') === 'git', 'git failed');
            console.assert(categorize('npm install') === 'npm', 'npm failed');
            console.assert(categorize('docker ps') === 'docker', 'docker failed');
            console.assert(categorize('ls -la') === 'linux', 'linux failed');
            console.assert(categorize('ng serve') === 'angular', 'angular failed');
            console.assert(categorize('go run main.go') === 'go', 'go failed');
            console.assert(categorize('aws s3 ls') === 'cloud', 'cloud failed');
            console.assert(categorize('jest') === 'testing', 'testing failed');
            console.log('✅ All categorizer tests passed!');
          "

      # Step 7 — Test CLI entry point loads correctly
      - name: Test CLI loads
        run: |
          node bin/tracker.js --version
          echo "✅ CLI loads successfully!"